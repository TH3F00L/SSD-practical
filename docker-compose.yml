services:
  # Reverse proxy (no auth)
  nginx-proxy:
    image: nginx:latest
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - webnet

  # Search web app (frontend + backend)
  app:
    build: ./app
    container_name: search-app
    restart: unless-stopped
    environment:
      - PORT=3001
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=searchapp
      - DB_USER=appuser
      - DB_PASSWORD=apppass
    ports:
      - "3001:3001"
    depends_on:
      - db
    networks:
      - webnet

  # Database storing validated search queries
  db:
    image: postgres:16-alpine
    container_name: search-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=searchapp
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppass
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - webnet

  # Local Git server (Gitea)
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__ROOT_URL=http://localhost:3000/
      - GITEA__server__SSH_DOMAIN=localhost
      - GITEA__server__SSH_PORT=2222
    volumes:
      - ./gitea/data:/data
    ports:
      - "3000:3000"   # Web UI
      - "2222:22"     # Git over SSH
    networks:
      - webnet

networks:
  webnet:
    driver: bridge

volumes:
  db-data:
