name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install app dependencies
        working-directory: app
        run: npm install

      - name: Run npm audit (fails on high/critical vulnerabilities)
        working-directory: app
        run: npm audit --audit-level=high

  integration-test:
    runs-on: ubuntu-latest
    needs: dependency-check
    steps:
      - uses: actions/checkout@v4

      - name: Start app + database
        run: docker compose up -d --build app db

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/ && exit 0
            sleep 2
          done
          echo "App did not become ready in time" && exit 1

      - name: Install test dependencies
        working-directory: tests
        run: npm install

      - name: Run integration tests (over HTTP)
        working-directory: tests
        run: npm run test:integration
        env:
          BASE_URL: http://localhost:3001

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  ui-test:
    runs-on: ubuntu-latest
    needs: integration-test
    steps:
      - uses: actions/checkout@v4

      - name: Start app + database
        run: docker compose up -d --build app db

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/ && exit 0
            sleep 2
          done
          echo "App did not become ready in time" && exit 1

      - name: Install test dependencies
        working-directory: tests
        run: npm install

      - name: Install Playwright browser
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Run UI tests (over HTTP)
        working-directory: tests
        run: npm run test:ui
        env:
          BASE_URL: http://localhost:3001

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report

      - name: Tear down
        if: always()
        run: docker compose down -v
